<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinket Scanner ✨</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">

    <style>
        /* Base page styling */
        body {
            background-color: #fff0f5; /* Soft lavender blush/pink */
            font-family: 'Fredoka', sans-serif;
            color: #ff69b4; /* Cute hot pink for text */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Container card for the scanner */
        .app-container {
            background-color: #ffffff;
            border: 4px solid #ffb6c1; /* Light pink border */
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Title styling */
        h1 {
            font-size: 28px;
            margin-top: 0;
            color: #ff69b4;
            text-shadow: 1px 1px 2px #ffb6c1;
        }

        /* Subtitle/Decorative text */
        .subtitle {
            font-size: 14px;
            color: #ffb6c1;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Cute, bouncy Start Button */
        button {
            background-color: #ffb6c1;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0px #ff91a4;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #ff91a4;
            transform: translateY(2px);
            box-shadow: 0 2px 0px #ff69b4;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Webcam container formatting */
        #webcam-container {
            margin: 20px auto;
            border: 6px double #ffb6c1;
            border-radius: 20px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #ffe4e1; /* Pastel misty rose before camera loads */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        /* Label results container */
        #label-container {
            margin-top: 15px;
            background-color: #fff5f6;
            border-radius: 15px;
            padding: 15px;
        }

        /* Individual result rows */
        #label-container div {
            padding: 6px;
            font-size: 16px;
            font-weight: 500;
            color: #d87093; /* Pale violet red for high readability */
            border-bottom: 1px dashed #ffe4e1;
        }

        #label-container div:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>✨ Trinket Detector ✨</h1>
        <div class="subtitle">AP CSP Machine Learning Project</div>
        
        <button type="button" onclick="init()">Start Scanner 🌸</button>
        
        <div id="webcam-container">
            </div>
        
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // Your model URL
        const URL = "https://teachablemachine.withgoogle.com/models/7QSQ5kA2O/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // Load the model
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Setup the webcam
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            // Clear previous placeholder text if any, and append the camera canvas
            const webcamBox = document.getElementById("webcam-container");
            webcamBox.innerHTML = ""; 
            webcamBox.appendChild(webcam.canvas);
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // Clear old labels on restart
            for (let i = 0; i < maxPredictions; i++) { 
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                // Formatting the decimal to a nice percentage look (Optional but cleaner!)
                const percentage = (prediction[i].probability * 100).toFixed(0);
                const classPrediction = prediction[i].className + " 🎀 " + percentage + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
